name: Bot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')
    steps:
      - name: Auto-merge Claude AI PRs once checks pass
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}

  codex:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'codex/')
    steps:
      - name: Auto-merge Codex AI PRs once checks pass
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}

  copilot:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'copilot/')
    steps:
      - name: Auto-merge Copilot AI PRs once checks pass
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
