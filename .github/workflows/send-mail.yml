name: Send mail

on:
  workflow_dispatch:
    inputs:
      subject:
        description: 'Email subject'
        required: true
        type: string
      body:
        description: 'Email body (plain text)'
        required: true
        type: string

permissions: {}

jobs:
  send:
    runs-on: self-hosted
    timeout-minutes: 2
    steps:
      - name: Send via msmtp
        env:
          SUBJECT: ${{ inputs.subject }}
          BODY: ${{ inputs.body }}
        run: |
          {
            printf 'MIME-Version: 1.0\n'
            printf 'Content-Type: text/plain; charset=utf-8\n'
            printf 'Date: %s\n' "$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
            printf 'Subject: %s\n' "$SUBJECT"
            printf '\n%s\n' "$BODY"
          } | msmtp dev@denied.se
